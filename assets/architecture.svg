<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <rect width="1100" height="520" fill="#f6f7fb"/>
  <style>.box{fill:#fff;stroke:#d9e2ef;stroke-width:2;rx:18}.t{font:700 22px Arial, sans-serif;fill:#172033}.s{font:16px Arial, sans-serif;fill:#667085}.arrow{stroke:#185cff;stroke-width:3;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#185cff"/></marker></defs>
  <rect class="box" x="50" y="70" width="220" height="110"/><text class="t" x="80" y="115">用户/客户/业务方</text><text class="s" x="80" y="145">网站客服 / 机器人命令</text>
  <rect class="box" x="350" y="55" width="290" height="140"/><text class="t" x="390" y="105">FastAPI 服务层</text><text class="s" x="390" y="135">订单 · 库存 · 异常 · 线索</text><text class="s" x="390" y="160">AI 日报 / 异常分类</text>
  <rect class="box" x="735" y="55" width="300" height="140"/><text class="t" x="770" y="105">飞书/企微机器人</text><text class="s" x="770" y="135">Webhook 推送</text><text class="s" x="770" y="160">日报 / 异常 / 库存预警</text>
  <rect class="box" x="170" y="310" width="270" height="130"/><text class="t" x="205" y="360">飞书多维表格设计</text><text class="s" x="205" y="390">Orders / Inventory / Exceptions</text><text class="s" x="205" y="415">Leads / Reports</text>
  <rect class="box" x="540" y="310" width="360" height="130"/><text class="t" x="580" y="360">CC Switch 多模型路由</text><text class="s" x="580" y="390">Claude / GPT / Qwen / DeepSeek</text><text class="s" x="580" y="415">Kimi / GLM / Ollama 本地模型</text>
  <line class="arrow" x1="270" y1="125" x2="350" y2="125"/><line class="arrow" x1="640" y1="125" x2="735" y2="125"/><line class="arrow" x1="495" y1="195" x2="330" y2="310"/><line class="arrow" x1="540" y1="195" x2="690" y2="310"/>
</svg>
