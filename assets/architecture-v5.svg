<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Business FlowPilot V5 System Architecture</title>
  <desc id="desc">Frontend, FastAPI API layer, business services, SQLite data layer, Feishu webhook, workflow logs, AI report and Feishu Bitable mock sync.</desc>
  <defs>
    <style>
      .bg{fill:#f7fafc}.panel{fill:#fff;stroke:#d7dee8;stroke-width:2}.dark{fill:#14213d}.accent{fill:#0f766e}.blue{fill:#2563eb}.amber{fill:#d97706}.rose{fill:#be123c}.text{font:600 24px Arial,"Microsoft YaHei",sans-serif;fill:#172033}.small{font:500 16px Arial,"Microsoft YaHei",sans-serif;fill:#41516a}.tiny{font:500 14px Arial,"Microsoft YaHei",sans-serif;fill:#5b677a}.white{fill:#fff}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text x="64" y="64" class="text">AI Business FlowPilot V5 架构图</text>
  <text x="64" y="94" class="small">飞书低代码供应链与客服自动化系统：Mock 可演示，Real API 预留</text>

  <rect x="70" y="130" width="1140" height="90" rx="14" class="panel"/>
  <rect x="92" y="155" width="230" height="40" rx="8" class="blue"/>
  <text x="112" y="182" class="white small">前端页面</text>
  <text x="350" y="166" class="small">Dashboard / 一键业务闭环 / SQL 查询结果 / 飞书多维表格接入 / AI 异常分类</text>
  <text x="350" y="194" class="tiny">HTML + CSS + JavaScript 通过 /api/* 调用 FastAPI</text>

  <path d="M640 220 L640 265" class="arrow"/>
  <rect x="70" y="265" width="1140" height="90" rx="14" class="panel"/>
  <rect x="92" y="290" width="230" height="40" rx="8" class="dark"/>
  <text x="112" y="317" class="white small">FastAPI API 层</text>
  <text x="350" y="302" class="small">RESTful API / Swagger Docs / 参数校验 / Lifespan 初始化 SQLite</text>
  <text x="350" y="330" class="tiny">/api/demo/run-full-flow, /api/sql/examples, /api/feishu/bitable/*, /api/ai/*</text>

  <path d="M640 355 L640 400" class="arrow"/>
  <rect x="70" y="400" width="1140" height="150" rx="14" class="panel"/>
  <rect x="92" y="425" width="230" height="40" rx="8" class="accent"/>
  <text x="112" y="452" class="white small">业务服务层</text>
  <text x="350" y="433" class="small">SQL 查询服务 · AI 异常分类 · 多模型路由 · 外部 API Mock · 飞书 Bitable Mock</text>
  <text x="350" y="466" class="tiny">店铺订单同步、WMS 库存校验、物流轨迹、财务对账、CRM 线索沉淀</text>
  <rect x="350" y="488" width="150" height="34" rx="8" fill="#e0f2fe"/>
  <text x="372" y="511" class="tiny">SQL rows</text>
  <rect x="520" y="488" width="150" height="34" rx="8" fill="#dcfce7"/>
  <text x="542" y="511" class="tiny">AI reports</text>
  <rect x="690" y="488" width="180" height="34" rx="8" fill="#fef3c7"/>
  <text x="712" y="511" class="tiny">Model routing</text>
  <rect x="890" y="488" width="220" height="34" rx="8" fill="#ffe4e6"/>
  <text x="912" y="511" class="tiny">Feishu Mock/Real</text>

  <path d="M420 550 L420 600" class="arrow"/>
  <path d="M640 550 L640 600" class="arrow"/>
  <path d="M860 550 L860 600" class="arrow"/>

  <rect x="70" y="600" width="300" height="95" rx="14" class="panel"/>
  <rect x="94" y="624" width="110" height="32" rx="8" class="blue"/>
  <text x="113" y="646" class="white tiny">SQLite</text>
  <text x="94" y="674" class="tiny">orders / inventory / exceptions</text>
  <text x="94" y="694" class="tiny">customer_leads / finance / ai_reports</text>

  <rect x="410" y="600" width="350" height="95" rx="14" class="panel"/>
  <rect x="434" y="624" width="150" height="32" rx="8" class="amber"/>
  <text x="453" y="646" class="white tiny">业务沉淀</text>
  <text x="434" y="674" class="tiny">workflow_logs 持久化</text>
  <text x="434" y="694" class="tiny">AI 日报 / 异常摘要 / SQL 分析结果</text>

  <rect x="800" y="600" width="410" height="95" rx="14" class="panel"/>
  <rect x="824" y="624" width="150" height="32" rx="8" class="rose"/>
  <text x="843" y="646" class="white tiny">飞书协作</text>
  <text x="824" y="674" class="tiny">飞书机器人 Webhook 状态展示</text>
  <text x="824" y="694" class="tiny">飞书多维表格 Mock 同步，Real API 预留</text>
</svg>
